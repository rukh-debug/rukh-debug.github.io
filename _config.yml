theme: minima

title: Ruben's Blog
author: Ruben Kharel
email: talkto@rubenk.dev
url: https://rubenk.dev

timezone: Etc/UTC # GitHub uses UTC. This is to force dev environment to match
future: false # GitHub Pages will publish future posts if this isn't set to false

description: >
  There is where I write my blogs.

# Minima variables
twitter_username:  getrubenk
github_username:   rukh-debug
linkedin_username: rubenkharel
#dribbble_username: jekyll
#facebook_username: jekyll
#flickr_username: jekyll
#instagram_username: jekyll
#pinterest_username: jekyll
#youtube_username: jekyll
#googleplus_username: +jekyll
rss: rss

show_excerpts: false

# Used by simple links page
social-links:
  Resume:        https://rubenk.dev/resume.html
  LinkedIn:      https://linkedin.com/in/rubenkharel
  # StackOverflow: https://stackoverflow.com/users/3474677
  # HackerRank:    https://hackerrank.com/chadwin
  GitHub:        https://github.com/rukh-debug
  Twitter:       https://twitter.com/getrubenk
  # Reddit:        https://reddit.com/user/chadbaldwin
  # Credly:        https://credly.com/users/chadbaldwin
  # PluralSight:   https://app.pluralsight.com/profile/chadbaldwin
  Website:       https://rubenk.dev

plugin: jekyll-seo-tag
# https://github.com/jekyll/jekyll-seo-tag/blob/master/docs/usage.md
twitter:
  username: getrubenk
  card: summary_large_image
social:
  name: Ruben Kharel
  links:
    - https://linkedin.com/in/rubenkharel
    - https://github.com/rukh-debug
    - https://twitter.com/getrubenk

plugin: jekyll-titles-from-headings
titles_from_headings:
  strip_title: true

collections:
  personal: # collection for personal blog posts
    output: true

header_pages:
  - resume.html
  - archive.html
  - books.md
  - bookmarks.md

plugins:
  - jekyll-feed
  - jekyll-sitemap

google_analytics:
  # - UA-185058308-1 # Old GA Universal Analytics property
  # - G-RY6FRPMXHZ # New GA4 property

gravatar_hash: e2af883f58947c40d0ba57ee34c278e5
code_block_max_height: 500px

home_post_limit: 5

# The github repo that is to be used for looking up comments
comments_repo: rukh-debug/rukh-debug.github.io

defaults:
  - scope:
      path: ""
    values:
      image: https://s.gravatar.com/avatar/e2af883f58947c40d0ba57ee34c278e5?s=800 # Apply default site image
  - scope:
      path: ""
      type: posts
    values:
      tags:
        - Other # Add a default tag to all posts

# Disable highlighting to use highlightJS instead
# highlighter: none # Not supported by GitHub Pages
kramdown:
  syntax_highlighter_opts:
    disable: true


include:
  - .well-known
